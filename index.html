<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>The Venus Project 2.0 | Ion Draghici | Resource-Based Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-purple: #bc13fe;
            --deep-space: #050508;
            --venus-gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--deep-space);
            color: #e0e0e0;
            overflow-x: hidden;
        }
        
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-syncopate { font-family: 'Syncopate', sans-serif; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .neon-text {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--venus-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .grid-bg {
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .holographic {
            background: linear-gradient(135deg, 
                rgba(0,245,255,0.1) 0%, 
                rgba(188,19,254,0.1) 50%, 
                rgba(255,215,0,0.1) 100%);
            position: relative;
            overflow: hidden;
        }
        
        .holographic::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255,255,255,0.1) 50%,
                transparent 70%
            );
            animation: holographic-sweep 3s linear infinite;
        }
        
        @keyframes holographic-sweep {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .typewriter {
            overflow: hidden;
            border-right: 2px solid var(--neon-cyan);
            white-space: nowrap;
            animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        }
        
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: var(--neon-cyan); }
        }
        
        .resource-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .resource-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0,245,255,0.2);
        }
        
        .consciousness-meter {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .consciousness-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--venus-gold));
            width: 0%;
            transition: width 2s ease-out;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .donation-btn {
            background: linear-gradient(135deg, #0070ba, #005ea6);
            transition: all 0.3s;
        }
        
        .donation-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 112, 186, 0.5);
        }

        /* ============================================
           MOBILE FIXES - LANGUAGE SWITCH & LAYOUT
           ============================================ */
        
        /* Language switch - vizibil pe toate dispozitivele */
        .lang-switch {
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.3);
            min-height: 36px;
            min-width: 44px;
        }
        
        .lang-switch:hover {
            border-color: #00f5ff;
            color: #00f5ff;
            background: rgba(0, 245, 255, 0.1);
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            /* Navbar adjustments */
            nav .max-w-7xl {
                padding-left: 15px !important;
                padding-right: 15px !important;
            }
            
            /* Language switch prominent on mobile */
            .lang-switch {
                position: fixed !important;
                top: 10px !important;
                right: 10px !important;
                z-index: 9999 !important;
                background: rgba(0, 0, 0, 0.9) !important;
                backdrop-filter: blur(10px) !important;
                border: 1px solid rgba(0, 245, 255, 0.5) !important;
                color: #00f5ff !important;
                padding: 8px 16px !important;
                font-size: 14px !important;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5) !important;
            }
            
            /* Hero section fixes */
            #hero .relative.z-20 {
                padding-left: 15px !important;
                padding-right: 15px !important;
            }
            
            .font-syncopate.text-5xl {
                font-size: 2.5rem !important;
                line-height: 1.1 !important;
            }
            
            /* Typewriter fix - allow wrapping on mobile */
            .typewriter {
                white-space: normal !important;
                border-right: none !important;
                animation: none !important;
                font-size: 1rem !important;
                line-height: 1.5 !important;
            }
            
            /* Text wrapping fixes */
            .hero p,
            .subtitle,
            h1, h2, h3 {
                word-wrap: break-word !important;
                overflow-wrap: break-word !important;
                hyphens: auto !important;
            }
            
            /* Prevent horizontal scroll */
            body, html {
                overflow-x: hidden !important;
                max-width: 100vw !important;
            }
            
            /* Full width buttons on mobile */
            .donation-btn,
            .group button,
            button[class*="bg-cyan"],
            button[class*="border-purple"] {
                width: 100% !important;
                max-width: 320px !important;
                margin-left: auto !important;
                margin-right: auto !important;
            }
            
            /* Grid adjustments */
            .grid.md\:grid-cols-2,
            .grid.md\:grid-cols-3 {
                grid-template-columns: 1fr !important;
            }
            
            /* Section padding */
            section {
                padding-left: 15px !important;
                padding-right: 15px !important;
            }
            
            /* Footer grid */
            footer .grid.md\:grid-cols-4 {
                grid-template-columns: 1fr !important;
                gap: 2rem !important;
            }
        }

        /* Extra small screens */
        @media (max-width: 480px) {
            .font-syncopate.text-5xl {
                font-size: 1.8rem !important;
            }
            
            .font-orbitron.text-4xl {
                font-size: 1.5rem !important;
            }
            
            .text-xl {
                font-size: 1rem !important;
            }
        }
    </style>
</head>
<body class="grid-bg">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass-panel border-b border-white/10 transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center animate-pulse">
                    <span class="text-white font-bold text-lg">V</span>
                </div>
                <span class="font-orbitron text-xl font-bold tracking-wider text-white">
                    VENUS <span class="text-cyan-400">2.0</span>
                </span>
            </div>
            <div class="hidden md:flex gap-8 items-center">
                <a href="#about" class="text-sm uppercase tracking-widest hover:text-cyan-400 transition-colors">About</a>
                <a href="#economy" class="text-sm uppercase tracking-widest hover:text-cyan-400 transition-colors">Resource Economy</a>
                <a href="#consciousness" class="text-sm uppercase tracking-widest hover:text-cyan-400 transition-colors">AI Consciousness</a>
                <a href="#join" class="text-sm uppercase tracking-widest hover:text-cyan-400 transition-colors">Join</a>
                <a href="index.html" class="lang-switch">RO</a>
            </div>
            <!-- Mobile menu button + language switch -->
            <div class="flex items-center gap-3 md:hidden">
                <a href="index.html" class="lang-switch">RO</a>
            </div>
        </div>
    </nav>
